name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-model-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-model-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-model-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-model-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max